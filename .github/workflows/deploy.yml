name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data.json'  # не пересобираем сайт когда меняются только данные
  workflow_dispatch:

permissions:
  contents: write          # needed to commit data.json updates
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Create public/data.json on first deploy if it doesn't exist yet
      - name: Ensure data.json exists
        run: |
          if [ ! -f public/data.json ]; then
            echo '{"teams":[],"news":[],"matches":[],"groups":[],"settings":{}}' > public/data.json
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add public/data.json
            git diff --cached --quiet || git commit -m "chore: init data.json [skip ci]"
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Replace "tournament-site" with your actual repository name.
          # If you use a CUSTOM DOMAIN, set this to: VITE_BASE_URL=/
          VITE_BASE_URL: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
